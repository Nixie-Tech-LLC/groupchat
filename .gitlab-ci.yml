# GitLab CI for groupchat.
#
# On every version tag (vX.Y.Z) this builds native binaries and publishes a
# GitLab Release with them attached, plus an `install.sh`. End users install a
# prebuilt binary — no Rust toolchain on their side.
#
# Reliable on GitLab.com shared Linux runners: linux-amd64 (guaranteed), with
# linux-arm64 and windows-amd64 as best-effort (allow_failure). macOS needs
# GitLab SaaS macOS runners (Premium+); those jobs are `when: manual` so a
# missing runner never blocks the pipeline — flip them to on_success if you have
# the runners, or use the GitHub release.yml (cargo-dist) which builds mac/win/
# linux on free runners.
#
# The release job assembles its asset list from whichever build jobs succeeded,
# so a failed/absent platform simply doesn't appear — it never breaks the release.

stages: [check, build, release]

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_TERM_COLOR: "always"
  # GitLab Generic Package Registry location for this tag's assets.
  PKG_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/groupchat/${CI_COMMIT_TAG}"

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS == null'

.cargo_cache: &cargo_cache
  cache:
    key: "cargo-$CI_JOB_NAME"
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - .cargo/git/db
      - target/

# ---------------------------------------------------------------------------
# check: quick compile on branch/MR pushes (not tags)
# ---------------------------------------------------------------------------
check:
  stage: check
  image: rust:1-bookworm
  <<: *cargo_cache
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  script:
    - cargo build --locked --release

# ---------------------------------------------------------------------------
# build: native binaries, only on version tags
# ---------------------------------------------------------------------------
.build_linux:
  stage: build
  image: rust:1-bookworm
  <<: *cargo_cache
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
  script:
    - rustup target add "$TARGET"
    - if [ -n "$APT" ]; then apt-get update && apt-get install -y --no-install-recommends $APT; fi
    - cargo build --locked --release --target "$TARGET"
    - mkdir -p dist assets
    - PKG="groupchat-${TARGET}.tar.gz"
    - tar -C "target/${TARGET}/release" -czf "dist/${PKG}" groupchat
    - 'curl --fail --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/${PKG}" "${PKG_URL}/${PKG}"'
    - printf '{"name":"%s","url":"%s/%s","link_type":"package"}' "$PKG" "$PKG_URL" "$PKG" > "assets/${TARGET}.json"
  artifacts:
    paths: [assets/]
    expire_in: 1 week

build:linux-amd64:
  extends: .build_linux
  variables:
    TARGET: x86_64-unknown-linux-gnu

build:linux-arm64:
  extends: .build_linux
  allow_failure: true
  variables:
    TARGET: aarch64-unknown-linux-gnu
    APT: gcc-aarch64-linux-gnu
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc

build:windows-amd64:
  stage: build
  image: rust:1-bookworm
  <<: *cargo_cache
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
  variables:
    TARGET: x86_64-pc-windows-gnu
  script:
    - rustup target add "$TARGET"
    - apt-get update && apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64 zip
    - cargo build --locked --release --target "$TARGET"
    - mkdir -p dist assets
    - PKG="groupchat-${TARGET}.zip"
    - (cd "target/${TARGET}/release" && zip "${CI_PROJECT_DIR}/dist/${PKG}" groupchat.exe)
    - 'curl --fail --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/${PKG}" "${PKG_URL}/${PKG}"'
    - printf '{"name":"%s","url":"%s/%s","link_type":"package"}' "$PKG" "$PKG_URL" "$PKG" > "assets/${TARGET}.json"
  artifacts:
    paths: [assets/]
    expire_in: 1 week

# macOS — requires GitLab SaaS macOS runners (Premium+). Manual by default so a
# missing runner never blocks the pipeline. Set `when: on_success` if you have them.
.build_macos:
  stage: build
  tags: [saas-macos-medium-m1]
  image: macos-14-xcode-15
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
      when: manual
  script:
    - rustup target add "$TARGET"
    - cargo build --locked --release --target "$TARGET"
    - mkdir -p dist assets
    - PKG="groupchat-${TARGET}.tar.gz"
    - tar -C "target/${TARGET}/release" -czf "dist/${PKG}" groupchat
    - 'curl --fail --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/${PKG}" "${PKG_URL}/${PKG}"'
    - printf '{"name":"%s","url":"%s/%s","link_type":"package"}' "$PKG" "$PKG_URL" "$PKG" > "assets/${TARGET}.json"
  artifacts:
    paths: [assets/]
    expire_in: 1 week

build:macos-arm64:
  extends: .build_macos
  variables:
    TARGET: aarch64-apple-darwin

build:macos-amd64:
  extends: .build_macos
  variables:
    TARGET: x86_64-apple-darwin

# A platform-detecting install.sh, published alongside the binaries.
package:installer:
  stage: build
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
  script:
    - apk add --no-cache curl
    - mkdir -p dist assets
    - |
      cat > dist/install.sh <<EOF
      #!/bin/sh
      # groupchat installer — downloads the prebuilt binary for this platform.
      set -e
      BASE="${PKG_URL}"
      os=\$(uname -s); arch=\$(uname -m)
      case "\$os-\$arch" in
        Linux-x86_64)            t=x86_64-unknown-linux-gnu; ext=tar.gz;;
        Linux-aarch64|Linux-arm64) t=aarch64-unknown-linux-gnu; ext=tar.gz;;
        Darwin-arm64)            t=aarch64-apple-darwin; ext=tar.gz;;
        Darwin-x86_64)           t=x86_64-apple-darwin; ext=tar.gz;;
        *) echo "unsupported platform: \$os-\$arch" >&2; exit 1;;
      esac
      url="\$BASE/groupchat-\$t.\$ext"
      dest="\${GROUPCHAT_BIN_DIR:-\$HOME/.local/bin}"
      mkdir -p "\$dest"
      tmp=\$(mktemp -d)
      trap 'rm -rf "\$tmp"' EXIT
      echo "downloading \$url"
      # Download to a file and check curl's exit explicitly. Do NOT pipe curl into
      # tar: on a 404 with -f, curl emits an empty body, and bsdtar (macOS) treats
      # empty input as an empty archive and exits 0 — so the install would silently
      # "succeed" with no binary written.
      if ! curl -fsSL "\$url" -o "\$tmp/groupchat.\$ext"; then
        echo "error: download failed for \$t — this platform's binary may not be" >&2
        echo "       published for this release. See the assets under \$BASE" >&2
        exit 1
      fi
      tar -xzf "\$tmp/groupchat.\$ext" -C "\$dest"
      if [ ! -x "\$dest/groupchat" ]; then
        echo "error: install failed — \$dest/groupchat is missing after extraction." >&2
        exit 1
      fi
      chmod +x "\$dest/groupchat"
      echo "installed groupchat to \$dest (add it to PATH if needed)"
      EOF
    - 'curl --fail --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/install.sh" "${PKG_URL}/install.sh"'
    - printf '{"name":"install.sh","url":"%s/install.sh","link_type":"other"}' "$PKG_URL" > "assets/installer.json"
  artifacts:
    paths: [assets/]
    expire_in: 1 week

# ---------------------------------------------------------------------------
# release: assemble a GitLab Release from whatever built
# ---------------------------------------------------------------------------
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
  script:
    - |
      set -e
      ASSET_ARGS=""
      for f in assets/*.json; do
        [ -e "$f" ] || continue
        ASSET_ARGS="$ASSET_ARGS --assets-link $(cat "$f")"
      done
      echo "release assets:"; cat assets/*.json 2>/dev/null || echo "(none)"
      # shellcheck disable=SC2086
      release-cli create \
        --name "groupchat ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "Automated release ${CI_COMMIT_TAG}. Prebuilt binaries below — no Rust required. Install: curl -fsSL <install.sh link> | sh" \
        $ASSET_ARGS
